# ============================================================
# RFP Radar v8.3 - ?җлҸҷ ?Өн–ү ?ҢнҒ¬?ҢлЎң??
# л§Өмқј ??кё??ңкөӯ?ңк°„ 9:00 AM ?Өн–ү (GitHub Actions)
# ============================================================
name: RFP Radar Daily

on:
  schedule:
    # UTC 0:00 = KST 9:00 AM (??кё?
    - cron: '0 0 * * 1-5'
  
  # ?ҳлҸҷ ?Өн–ү (?ҢмҠӨ?ёмҡ©)
  workflow_dispatch:

jobs:
  rfp-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. мҪ”л“ң мІҙнҒ¬?„мӣғ
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python ?Өм •
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 3. ?ҳмЎҙ???Өм№ҳ
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r rfp_radar/requirements.txt

      # 4. м¶ңл Ҙ ?”л ү? лҰ¬ ?қм„ұ
      - name: Create output directory
        run: mkdir -p rfp_radar/data/daily_reports

      # 5. RFP Radar v8.3 ?Өн–ү
      - name: Run RFP Radar v8.3
        env:
          RFP_SERVICE_KEY: ${{ secrets.RFP_SERVICE_KEY }}
          RFP_OPENAI_API_KEY: ${{ secrets.RFP_OPENAI_API_KEY }}
          RFP_SENDER_EMAIL: ${{ secrets.RFP_SENDER_EMAIL }}
          RFP_SENDER_PASSWORD: ${{ secrets.RFP_SENDER_PASSWORD }}
          RFP_RECIPIENT_EMAILS: ${{ secrets.RFP_RECIPIENT_EMAILS }}
        working-directory: rfp_radar
        run: python rfp_radar_v84.py

      # 6. ?Өн–ү кІ°кіј ?„м№ҙ?ҙлёҢ (7??ліҙк?)
      - name: Archive results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rfp-results-${{ github.run_id }}
          path: rfp_radar/data/daily_reports/
          retention-days: 7
